# Author: alchem1no
# GitHub: github.com/alchem1no
# Shortcuts to clear password buffer: ESC, Ctrl+U, Ctrl+Backspace

$font    = CaskaydiaCove Nerd Font
$refresh = pkill -USR2 hyprlock

$col_tokyonight_foreground = rgba(c0caf5ee)
$col_tokyonight_background = rgba(1a1b26ee)

$col_tokyonight_background_transparent = rgba(1a1b2677)

$col_tokyonight_purple  = rgba(bb9af7ee)
$col_tokyonight_magenta = rgba(ff007cee)
$col_tokyonight_blue    = rgba(7aa2f7ee)
$col_tokyonight_cyan    = rgba(7dcfffee)
$col_tokyonight_green   = rgba(9ece6aee)

$col_tokyonight_purple_darker = rgba(9d7cd8ee)
$col_tokyonight_green_pastel = rgba(73dacaee)

$col_tokyonight_yellow = rgba(e0af68ee)
$col_tokyonight_red    = rgba(f7768eee)

$col_bi_1 = rgba(d60270ee)
$col_bi_2 = rgba(9b4f96ee)
$col_bi_3 = rgba(0038a8ee)

$shadow_passes_default = 3
$shadow_size_default   = 2
$shadow_color_default  = $col_tokyonight_background
$shadow_boost_default  = 1.4

$border_size   = 3

$pos_kb_layout =  24.5%, -24%
$pos_user_name =  24.5%, -1.0%
$pos_time      = -20.0%,  20.0%
$pos_fortune   = -20%,   -20%

# $pango_default_text_size = 15000

# SETTINGS
general {
    hide_cursor         = true
    ignore_empty_input  = true
    immediate_render    = false
    text_trim           = true
    fractional_scaling  = 2
    screencopy_mode     = 1 # For Architude
    fail_timeout        = 1500
}

auth {
    pam {
        enabled = true
        module  = hyprlock
    }
    fingerprint {
        enabled         = false
        ready_message   = Scan fingerprint to unlock
        present_message = Scanning...
        retry_delay     = 250 # in milliseconds
    }
}

animations {
    enabled = true

    bezier = linear,    0.00, 0.00, 1.00, 1.00
    bezier = easeOut,   0.25, 0.80, 0.66, 1.00
    bezier = easeIn,    0.75, 0.20, 1.00, 0.66
    bezier = easeInOut, 0.42, 0.00, 0.58, 1.00

    animation = fadeIn,  1, 10, easeOut
    animation = fadeOut, 1, 3,  easeIn

    animation = inputFieldColors, 1, 3, easeInOut
    animation = inputFieldDots,   1, 1, easeOut
#   animation = inputFieldFade,   1, 3, easeOut
    animation = inputFieldWidth,  1, 3, easeOut
}

background {
    monitor = 
    path    = screenshot
    color   = $col_tokyonight_background

    blur_passes = 3
    blur_size   = 6

    noise             = 0.0117
    contrast          = 0.8916
    brightness        = 0.8172
    vibrancy          = 0.1696
    vibrancy_darkness = 0.05

    reload_time    = -1 # Currently ignored
    reload_cmd     = 
    crossfade_time = -1.0
    
    zindex = -1
}
# Experimental: xray-style shape for upper bar
# shape {
#     monitor  = 
#     halign   = center
#     valign   = top
#     zindex   = 0
#     position = 0%, 0%
# 
#     size     = 100%, 5%
#     rounding = 0
#     xray     = true
# }


# RIGHT SIDE
image {
    monitor  = 
    halign   = right
    valign   = center
    zindex   = 0
    position = -20.0%, 15.0%

    path     = /home/$USER/Pictures/pfp/Up-In-The-Smoke-2000.jpg
    size     = 150
    rounding = -1
    rotate   = 0

    border_size  = 4
    border_color = $col_tokyonight_green_pastel

    shadow_passes = $shadow_passes_default
    shadow_size   = $shadow_size_default
    shadow_color  = $shadow_color_default
    shadow_boost  = $shadow_boost_default

    reload_time = -1
    reload_cmd  = 
}

# User name
label {
    monitor = 
    halign     = center
    valign     = center
    text_align = center
    position   = $pos_user_name

    text        = $USER
    font_size   = 24
    font_family = $font
    color       = $col_tokyonight_foreground
}
shape {
    monitor  = 
    halign   = center
    valign   = center
    position = $pos_user_name
    zindex   = 0

    size        = 10%, 6%
    border_size = $border_size
    rounding    = -1

    color        = $col_tokyonight_background_transparent
    border_color = $col_tokyonight_blue

    shadow_passes = $shadow_passes_default
    shadow_size   = $shadow_size_default
    shadow_color  = $shadow_color_default
    shadow_boost  = $shadow_boost_default
}

input-field {
    monitor  = 
    halign   = center
    valign   = center
    zindex   = 0
    position = 24.5%, -15.0%

    size              = 20%, 6%
    outline_thickness = 4
    rounding          = -1

    hide_input            = false
    hide_input_base_color = $col_tokyonight_purple

    fade_on_empty = false
    fade_timeout  = 2000

    dots_size        = 0.4
    dots_spacing     = 0.25
    dots_center      = true
    dots_rounding    = -1
    dots_text_format = 

    inner_color = $col_tokyonight_background_transparent
    outer_color = $col_tokyonight_magenta 0deg
    check_color = $col_tokyonight_blue $col_tokyonight_cyan 180deg
    fail_color  = $col_tokyonight_red $col_tokyonight_magenta 0deg

    capslock_color  = $col_tokyonight_yellow
    numlock_color   = 
    bothlock_color  = 
    invert_numlock  = false
    swap_font_color = false

    font_color  = $col_tokyonight_foreground
    font_family = $font

    placeholder_text = <span size="16000">Type your user password (Esc to clear)</span>
    check_text       = <span size="16000">Authenticating...</span>
    fail_text        = <span size="16000">$PAMFAIL (Attempts: <b>$ATTEMPTS</b>)</span>
    
    shadow_passes = $shadow_passes_default
    shadow_size   = $shadow_size_default
    shadow_color  = $shadow_color_default
    shadow_boost  = $shadow_boost_default
}

# Keboard layout
label {
    monitor = 
    halign     = center
    valign     = center
    text_align = center
    position   = $pos_kb_layout

    text       = $LAYOUT[en,ru]
    font_size   = 24
    font_family = $font
    color       = $col_tokyonight_foreground
}
shape {
    monitor = 
    halign = center
    valign = center
    zindex = 0
    position = $pos_kb_layout

    size = 4.1%, 5.5%
    border_size = $border_size
    rounding    = -1
    
    color        = $col_tokyonight_background_transparent
    border_color = $col_tokyonight_purple

    shadow_passes = $shadow_passes_default
    shadow_size   = $shadow_size_default
    shadow_color  = $shadow_color_default
    shadow_boost  = $shadow_boost_default
}

# LEFT SIDE
# Time & Data (they share a shape)
label {
    monitor    = 
    halign     = center
    valign     = center
    text_align = center
    position   = -20.0%, 25.0%

    text        = $TIME
    font_size   = 90
    font_family = $font
    color       = $col_tokyonight_foreground
}
label {
    monitor    = 
    halign     = center
    valign     = center
    text_align = center
    position   = -20.0%, 13.0%

    text        = cmd[update:60000] date +"%A, %d %B %Y" # update every 60 seconds
    font_size   = 25
    font_family = $font
    color       = $col_tokyonight_foreground

    shadow_passes = $shadow_passes_default
    shadow_size   = $shadow_size_default
    shadow_color  = $shadow_color_default
    shadow_boost  = $shadow_boost_default
}
shape {
    monitor  = 
    halign   = center
    valign   = center
    zindex   = 0
    position = -20.0%, 21.0%

    size        = 35%, 30%
    border_size = $border_size
    rounding    = 16
    
    color        = $col_tokyonight_background_transparent
    border_color = $col_tokyonight_foreground

    shadow_passes = $shadow_passes_default
    shadow_size   = $shadow_size_default
    shadow_color  = $shadow_color_default
    shadow_boost  = $shadow_boost_default
}

# Fortune quote
label {
    monitor    = 
    halign     = center
    valign     = center
    text_align = center
    position   = $pos_fortune
    
    text    = cmd[update:0:1] fortune -s | fmt -w 40 | fold -w 40 -s
    onclick = $refresh

    font_size   = 18
    font_family = $font
    color       = $col_tokyonight_foreground

    shadow_passes = $shadow_passes_default
    shadow_size   = $shadow_size_default
    shadow_color  = $shadow_color_default
    shadow_boost  = $shadow_boost_default
}
shape {
    monitor  = 
    halign   = center
    valign   = center
    zindex   = 0
    position = $pos_fortune

    size        = 45%, 35%
    border_size = $border_size
    rounding    = 16
    
    color        = $col_tokyonight_background_transparent
    border_color = $col_tokyonight_foreground

    shadow_passes = $shadow_passes_default
    shadow_size   = $shadow_size_default
    shadow_color  = $shadow_color_default
    shadow_boost  = $shadow_boost_default
}
