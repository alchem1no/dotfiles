context.properties = {
    # Sample rate in Hz (44.1 / 48 / 96 / 192)
    default.clock.rate          = 48000

    # Rates allowed for passthrough to avoid resampling
    default.clock.allowed-rates = [ 44100 48000 96000 192000 ]

    # Buffer size in samples
    # Smaller means lower latency but more CPU load
    # Larger means more headroom but added latency
    default.clock.quantum     = 2048
    default.clock.min-quantum = 1024
    default.clock.max-quantum = 8192

    # Resampler quality (0-15, default is 4)
    # Higher values sound cleaner but cost more CPU
    resample.quality = 5
}
